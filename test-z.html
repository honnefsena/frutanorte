<!DOCTYPE html>
<html>
<head>
  <style>
    .masthead { position: relative; }
    .hero { position: relative; z-index: 5; background: red; height: 100px; }
    .divider { position: relative; z-index: 125; overflow: hidden; }
    .waves { position: relative; transform: translateY(-16px); background: yellow; height: 40px; }
  </style>
</head>
<body>
  <div class="masthead">
    <div class="hero">Hero</div>
    <div class="divider">
      <div class="waves">Waves</div>
    </div>
  </div>
</body>
</html>
